<!DOCTYPE html>
<html lang="en">
<head>
    <title>{% block title %} {% endblock %}</title>
</head>

<body>
<header>
    <h1> Welcome to our Website</h1>
    {% with messages = get_flashed_messages() %}
    {% if messages %}
    {% for message in messages %}
    <p>{message}</p>
    {% endfor %}
    {% endif %}
    {% endwith%}
</header>

{% block content %}
{% endblock %}

<footer>
    <p>@Copyright 2083</p>
</footer>

</body>
</html>
